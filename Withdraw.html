<!DOCTYPE html>
<html>
<head>
<title>Withdraw</title>
<style>
body{
  font-family:Arial;
  background:#f5f5f5;
}

.box{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input, select{
  width:95%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="box">
<h2>Withdrawal Request</h2>

<input type="text" placeholder="Account Name">

<input type="text" placeholder="Account Number">

<select>
<option>Choose Bank</option>
<option>Opay</option>
<option>Palmpay</option>
<option>Moniepoint</option>
<option>Access Bank</option>
</select>

<input type="number" placeholder="Amount">

<button onclick="withdraw()">Submit</button>

</div>

<script>
function withdraw(){
  alert("Withdrawal Request Submitted");
}
</script>

</body>
</html>
