<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding-top:80px;margin:0}
.container{background:white;padding:30px 20px;margin:20px auto;border-radius:15px;max-width:350px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input{width:90%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{width:95%;padding:12px;background:orange;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}
button:hover{background:#e67e00}
h2{margin-bottom:20px;color:#333}
.links{margin-top:15px;font-size:14px}
.links a{color:orange;text-decoration:none;margin:0 5px}
</style>
</head>
<body>
<div class="container">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <div class="links">
        <a href="forgot.html">Forgot password?</a>
        <span>|</span>
        <a href="signup.html">Sign up</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert('Login successful!');
        window.location.href = 'dashboard.html';
    } catch (error) {
        alert('Invalid email or password!');
    }
});
</script>
</body>
</html>
